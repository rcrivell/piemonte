<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tesla Superchargers – Piemonte</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: sans-serif; background: #0a0a0a; color: #fff; }
  #header {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 20px; background: #111; border-bottom: 1px solid #222;
  }
  #header svg { flex-shrink: 0; }
  #header h1 { font-size: 16px; font-weight: 400; letter-spacing: 1px; }
  #header span { margin-left: auto; font-size: 12px; color: #666; }
  #map { width: 100vw; height: calc(100vh - 49px); }
  .leaflet-popup-content-wrapper {
    background: #1a1a1a; color: #fff; border: 1px solid #333;
    border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  }
  .leaflet-popup-tip { background: #1a1a1a; }
  .leaflet-popup-content { margin: 12px 16px; min-width: 160px; }
  .popup-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .popup-stalls { font-size: 12px; color: #cc0000; margin-bottom: 2px; }
  .popup-address { font-size: 11px; color: #888; }
  .popup-v3 { display: inline-block; margin-top: 6px; font-size: 10px;
    background: #cc0000; color: #fff; padding: 2px 6px; border-radius: 3px; }
</style>
</head>
<body>

<div id="header">
  <!-- Tesla T logo -->
  <svg width="24" height="28" viewBox="0 0 300 350" fill="#cc0000">
    <path d="M150 0 C100 0 0 20 0 20 C0 20 20 80 150 80 C280 80 300 20 300 20 C300 20 200 0 150 0Z"/>
    <path d="M150 80 L80 80 L150 350 L220 80 Z"/>
  </svg>
  <h1>TESLA SUPERCHARGERS &nbsp;·&nbsp; PIEMONTE</h1>
  <span id="count"></span>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map("map", {
  center: [44.95, 7.90],
  zoom: 8,
  zoomControl: true,
});

L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
  attribution: '&copy; <a href="https://carto.com/">CARTO</a> &copy; OSM contributors',
  maxZoom: 19,
}).addTo(map);

function makeIcon(kw) {
  const color = kw >= 250 ? '#cc0000' : kw >= 150 ? '#990000' : '#660000';
  return L.divIcon({
    className: "",
    html: `<svg width="28" height="36" viewBox="0 0 28 36" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="14" cy="34" rx="5" ry="2" fill="rgba(0,0,0,0.3)"/>
      <path d="M14 0 C6.3 0 0 6.3 0 14 C0 24 14 36 14 36 C14 36 28 24 28 14 C28 6.3 21.7 0 14 0Z"
            fill="${color}" stroke="#fff" stroke-width="1.5"/>
      <text x="14" y="19" text-anchor="middle" font-size="11" font-weight="bold"
            fill="white" font-family="sans-serif">⚡</text>
    </svg>`,
    iconSize: [28, 36], iconAnchor: [14, 36], popupAnchor: [0, -36],
  });
}


const stations = [
  { name: "Tesla Supercharger Torino Nord",      lat: 45.1093, lng: 7.6681, stalls: 12, kw: 250, addr: "Via Lanzo, Torino" },
  { name: "Tesla Supercharger Torino Lingotto",  lat: 45.0336, lng: 7.6762, stalls: 10, kw: 250, addr: "Via Nizza 294, Torino" },
  { name: "Tesla Supercharger Torino Ovest",     lat: 45.0525, lng: 7.6283, stalls: 8,  kw: 120, addr: "Corso Orbassano, Torino" },
  { name: "Tesla Supercharger Torino Est",       lat: 45.0700, lng: 7.7200, stalls: 8,  kw: 250, addr: "Str. del Portone, Torino" },
  { name: "Tesla Supercharger Novara",           lat: 45.4460, lng: 8.6156, stalls: 8,  kw: 250, addr: "Via Solaroli, Novara" },
  { name: "Tesla Supercharger Alessandria",      lat: 44.9125, lng: 8.6340, stalls: 8,  kw: 120, addr: "Via Piacenza, Alessandria" },
  { name: "Tesla Supercharger Asti",             lat: 44.8999, lng: 8.2050, stalls: 6,  kw: 120, addr: "Via Torino, Asti" },
  { name: "Tesla Supercharger Cuneo",            lat: 44.3841, lng: 7.5427, stalls: 6,  kw: 120, addr: "Via Vittorio Amedeo II, Cuneo" },
  { name: "Tesla Supercharger Verbania Baveno",  lat: 45.9074, lng: 8.5032, stalls: 8,  kw: 250, addr: "SS33 del Sempione, Baveno" },
  { name: "Tesla Supercharger Vercelli",         lat: 45.3264, lng: 8.4176, stalls: 6,  kw: 120, addr: "Centro Commerciale, Vercelli" },
  { name: "Tesla Supercharger Biella",           lat: 45.5633, lng: 8.0558, stalls: 6,  kw: 120, addr: "Via Rosselli, Biella" },
  { name: "Tesla Supercharger Gravellona Toce",  lat: 45.9227, lng: 8.4295, stalls: 8,  kw: 250, addr: "A26 Area di servizio, Gravellona Toce" },
];

document.getElementById("count").textContent = stations.length + " stations · OSM data";

stations.forEach(sc => {
  const marker = L.marker([sc.lat, sc.lng], { icon: makeIcon(sc.kw) }).addTo(map);
  marker.bindPopup(`
    <div class="popup-name">${sc.name}</div>
    <div class="popup-stalls">⚡ ${sc.stalls} stalls · ${sc.kw} kW</div>
    <div class="popup-address">${sc.addr}</div>
    ${sc.kw >= 250 ? '<span class="popup-v3">V3 · 250kW</span>' : ''}
  `);
});
</script>
</body>
</html>
